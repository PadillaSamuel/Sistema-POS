services:
  mysql-db:
    image: mysql:8.4
    container_name: mysql-artesanos
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - artesanos-net

  backend:
    build:
      context: ./sistema_pedidos
      network: host
    container_name: backend-api
    restart: always
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    depends_on:
      - mysql-db
    env_file:
      - ./sistema_pedidos/.env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/${MYSQL_DATABASE}?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - TZ=${TZ}
    networks:
      - artesanos-net

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_IMPRESORA_COCINA=${VITE_IMPRESORA_COCINA}
        - VITE_IMPRESORA_FACTURA=${VITE_IMPRESORA_FACTURA}
    container_name: frontend-pedidos
    restart: always
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - artesanos-net

volumes:
  db_data:

networks:
  artesanos-net:
    driver: bridge
